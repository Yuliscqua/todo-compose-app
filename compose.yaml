services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    networks:
      - frontend-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    networks:
      - frontend-network
      - backend-network
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: todo_db
      DB_USER: todo_user
      DB_PASSWORD: todo_password
      DB_PORT: 5432

  db:
    image: postgres:16
    networks:
      - backend-network
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  frontend-network:
  backend-network:

volumes:
  postgres_data: